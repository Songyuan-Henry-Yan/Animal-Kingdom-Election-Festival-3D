name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck + production build
        run: npm run build
      - name: Prove the election math (Teaching Example, D'Hondt, spoiler lab, determinism)
        run: npx tsx scripts/verifyVoting.ts
      - run: node scripts/verifyRoom.mjs
